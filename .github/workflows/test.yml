name: "Tests"

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

permissions:
  contents: read

jobs:
  pytest:
    name: "Pytest"
    runs-on: "ubuntu-latest"
    timeout-minutes: 15
    steps:
      - name: "Checkout the repository"
        uses: "actions/checkout@v7.0.0"

      - name: "Set up Python"
        uses: "actions/setup-python@v6.3.0"
        with:
          python-version: "3.14"
          cache: "pip"

      - name: "Install requirements"
        run: python3 -m pip install -r requirements.txt

      - name: "Run tests"
        run: python3 -m pytest
